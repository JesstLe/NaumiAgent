name: subagent_events
description: subagent、team、todo 和恢复事件在两种终端 UI 中都能按顺序复现。
events:
  - event: task_snapshot
    data:
      source: todo_write
      count: 3
      open_count: 2
      completed_count: 1
      summary: 1/3 completed
      items:
        - id: one
          status: completed
          subject: 扫描现有 UI 测试
        - id: two
          status: in_progress
          subject: 补充 e2e scenario
  - event: team_event
    data:
      event_type: handoff
      sender: planner
      recipient: renderer
      priority: high
      message: 请核对 CLI/TUI 输出边界。
  - event: subagent_event
    data:
      agent_name: ui-reviewer
      task_id: ui-e2e-001
      status: completed
      message: 终端回放检查完成。
  - event: recovery_event
    data:
      reason: output_truncated
      action: continue_output
      phase: completed
      attempt: 1
      before: 12000
      after: 420
      unit: chars
assert_cli_contains:
  - team handoff
  - planner
  - renderer
  - 子智能体 已完成
  - ui-reviewer
  - recovery completed
assert_tui_contains:
  - todo 已更新
  - team handoff
  - 子智能体 已完成
  - ui-reviewer
  - 恢复流程：completed
min_history_lines: 3

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00BFA5" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#1a1a2e"/>

  <!-- Hexagon outline -->
  <polygon
    points="256,72 412,164 412,348 256,440 100,348 100,164"
    fill="none"
    stroke="url(#g2)"
    stroke-width="2"
    stroke-dasharray="8,4"
  />

  <!-- Stylized N: left vertical stroke -->
  <line x1="150" y1="340" x2="150" y2="172" stroke="url(#g1)" stroke-width="36" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Stylized N: diagonal -->
  <line x1="150" y1="172" x2="362" y2="340" stroke="url(#g1)" stroke-width="36" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Stylized N: right vertical stroke -->
  <line x1="362" y1="340" x2="362" y2="172" stroke="url(#g1)" stroke-width="36" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Node dots at corners of N -->
  <circle cx="150" cy="172" r="12" fill="#00E676" filter="url(#glow)"/>
  <circle cx="150" cy="340" r="12" fill="#00E676" filter="url(#glow)"/>
  <circle cx="362" cy="172" r="12" fill="#00E676" filter="url(#glow)"/>
  <circle cx="362" cy="340" r="12" fill="#00E676" filter="url(#glow)"/>

  <!-- Small orbiting dots (agent nodes) -->
  <circle cx="256" cy="72" r="8" fill="#00E676" opacity="0.8"/>
  <circle cx="412" cy="164" r="6" fill="#00E676" opacity="0.5"/>
  <circle cx="412" cy="348" r="6" fill="#00E676" opacity="0.5"/>
  <circle cx="256" cy="440" r="8" fill="#00E676" opacity="0.8"/>
  <circle cx="100" cy="348" r="6" fill="#00E676" opacity="0.5"/>
  <circle cx="100" cy="164" r="6" fill="#00E676" opacity="0.5"/>

  <!-- Connection lines from N corners to orbiting dots -->
  <line x1="150" y1="172" x2="100" y2="164" stroke="#00E676" stroke-width="1.5" opacity="0.3"/>
  <line x1="362" y1="172" x2="412" y2="164" stroke="#00E676" stroke-width="1.5" opacity="0.3"/>
  <line x1="150" y1="172" x2="256" y2="72" stroke="#00E676" stroke-width="1.5" opacity="0.2"/>
  <line x1="362" y1="172" x2="256" y2="72" stroke="#00E676" stroke-width="1.5" opacity="0.2"/>
  <line x1="150" y1="340" x2="100" y2="348" stroke="#00E676" stroke-width="1.5" opacity="0.3"/>
  <line x1="362" y1="340" x2="412" y2="348" stroke="#00E676" stroke-width="1.5" opacity="0.3"/>
  <line x1="150" y1="340" x2="256" y2="440" stroke="#00E676" stroke-width="1.5" opacity="0.2"/>
  <line x1="362" y1="340" x2="256" y2="440" stroke="#00E676" stroke-width="1.5" opacity="0.2"/>
</svg>

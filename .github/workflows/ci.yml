name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run tests with process-isolated coverage
        shell: bash
        run: |
          set -euo pipefail
          python -m coverage erase
          pytest tests/e2e tests/integration -q --tb=short \
            --cov=src/naumi_agent --cov-append --cov-report=
          while IFS= read -r test_file; do
            pytest "$test_file" -q --tb=short \
              --cov=src/naumi_agent --cov-append --cov-report=
          done < <(find tests/unit -maxdepth 1 -name 'test_*.py' -print | sort)
          python -m coverage report --fail-under=50

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy src/naumi_agent --ignore-missing-imports || true
